<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/assests/native_StoreLogo.png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4CAF50" />

    <!-- Performance: Preconnect & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//www.google-analytics.com" />

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/assests/native_StoreLogo.png" />

    <!-- Fallback SEO (will be overridden by Helmet) -->
    <title>Native Bounty | Connecting Kenyan Farmers to Markets</title>
    <meta
      name="description"
      content="Native Bounty connects organic farmers directly to buyers through reliable logistics. Reduce post-harvest losses with 98% on-time delivery across 35+ market routes in Kenya."
    />
    <meta
      name="keywords"
      content="Native Bounty, farmers Kenya, agricultural logistics, farm to market, organic farming"
    />

    <!-- Canonical (fallback) -->
    <link rel="canonical" href="https://www.nativebounty.co.ke/" />

    <!-- Open Graph (fallback) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nativebounty.co.ke/" />
    <meta
      property="og:title"
      content="Native Bounty | Connecting Kenyan Farmers to Markets"
    />
    <meta
      property="og:description"
      content="Reliable agricultural logistics linking organic farmers directly to buyers."
    />
    <meta
      property="og:image"
      content="https://www.nativebounty.co.ke/assets/og-image.jpg"
    />
    <meta property="og:site_name" content="Native Bounty" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter Card (fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.nativebounty.co.ke/" />
    <meta
      name="twitter:title"
      content="Native Bounty | Connecting Kenyan Farmers to Markets"
    />
    <meta
      name="twitter:description"
      content="Reliable agricultural logistics linking organic farmers directly to buyers."
    />
    <meta
      name="twitter:image"
      content="https://www.nativebounty.co.ke/assets/twitter-image.jpg"
    />

    <!-- Geo Tags -->
    <meta name="geo.region" content="KE" />
    <meta name="geo.placename" content="Nairobi, Kenya" />
    <meta name="geo.position" content="-1.286389;36.817223" />
    <meta name="ICBM" content="-1.286389, 36.817223" />

    <!-- Security -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
